name: Daily KOSPI Valuation Update

on:
  schedule:
    # 매일 07:00 KST = 22:00 UTC (전날)
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update-kospi
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch fundamentals & compute Z-scores
        env:
          TZ: Asia/Seoul
        run: python src/fetch_fundamentals.py

      - name: Multi-factor engine (Value + Quality + Momentum + Regime)
        env:
          TZ: Asia/Seoul
        run: python src/multifactor_engine.py
        continue-on-error: true

      - name: Send Telegram alert
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGES_URL:        ${{ vars.PAGES_URL }}
          TZ: Asia/Seoul
        run: python src/telegram_notify.py

      - name: Commit & push updated data
        env:
          TZ: Asia/Seoul
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date '+%Y-%m-%d %H:%M')
            git commit -m "chore(data): daily KOSPI snapshot $DATE KST"
            git push
          fi

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "❌ KOSPI Valuation Radar 실패! GitHub Actions 로그 확인."
              },
              timeout=10,
          )
          EOF
